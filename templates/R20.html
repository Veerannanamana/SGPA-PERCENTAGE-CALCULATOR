<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      min-height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
      url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1400&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      color:white;
    }

    /* HEADER */

    header{
      width:100%;
      padding:25px 20px;
      text-align:center;
      backdrop-filter: blur(8px);
      background:rgba(255,255,255,0.08);
      border-bottom:1px solid rgba(255,255,255,0.2);
      position:sticky;
      top:0;
      z-index:1000;
    }

    header h1{
      font-size:42px;
      letter-spacing:2px;
      margin-bottom:10px;
      color:#ffd700;
      text-shadow:2px 2px 10px rgba(0,0,0,0.5);
    }

    header h2{
      font-size:20px;
      font-weight:400;
      color:#f1f1f1;
    }

    /* MAIN */

    .container{
      width:100%;
      padding:50px 30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:30px;
      max-width:1400px;
      margin:auto;
    }

    /* CARD */

    .card{
      background:rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:25px;
      padding:35px 20px;
      text-align:center;
      transition:0.4s ease;
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:'';
      position:absolute;
      top:-50%;
      left:-50%;
      width:200%;
      height:200%;
      background:linear-gradient(
      45deg,
      transparent,
      rgba(255,255,255,0.1),
      transparent);
      transform:rotate(45deg);
      transition:0.7s;
    }

    .card:hover::before{
      left:100%;
    }

    .card:hover{
      transform:translateY(-10px) scale(1.03);
      background:rgba(255,255,255,0.18);
      box-shadow:0 15px 35px rgba(0,0,0,0.5);
    }

    .card a{
      text-decoration:none;
      color:white;
      font-size:28px;
      font-weight:bold;
      display:block;
      transition:0.3s;
    }

    .card:hover a{
      color:#ffd700;
    }

    /* FOOTER */

    footer{
      text-align:center;
      padding:20px;
      color:#ddd;
      font-size:15px;
      backdrop-filter: blur(8px);
      background:rgba(0,0,0,0.2);
    }

    /* MOBILE */

    @media(max-width:768px){

      header h1{
        font-size:28px;
      }

      header h2{
        font-size:16px;
      }

      .container{
        padding:30px 18px;
        gap:20px;
      }

      .card{
        padding:28px 15px;
      }

      .card a{
        font-size:24px;
      }
    }

    @media(max-width:480px){

      header{
        padding:20px 10px;
      }

      header h1{
        font-size:24px;
      }

      header h2{
        font-size:14px;
      }

      .card a{
        font-size:22px;
      }
    }

  </style>
</head>
