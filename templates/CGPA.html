<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KIET CGPA Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.70), rgba(0,0,0,0.75)),
    url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=1400&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
}

/* HEADER */

header{
    width:100%;
    padding:25px 20px;
    text-align:center;

    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.2);

    position:sticky;
    top:0;
    z-index:1000;
}

header h1{
    font-size:42px;
    color:#ffd700;
    margin-bottom:10px;
    letter-spacing:2px;
}

header h2{
    font-size:22px;
    font-weight:400;
    color:#f5f5f5;
}

/* CONTAINER */

.container{
    width:100%;
    display:flex;
    justify-content:center;
    padding:50px 20px;
}

/* CARD */

.card{
    width:100%;
    max-width:900px;

    background:rgba(255,255,255,0.12);

    backdrop-filter: blur(14px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:30px;

    padding:40px;

    box-shadow:0 10px 35px rgba(0,0,0,0.5);
}

.top-text{
    text-align:center;
    margin-bottom:35px;
}

.top-text h3{
    color:#ffd700;
    font-size:28px;
    margin-bottom:10px;
}

.top-text p{
    color:#f0f0f0;
    font-size:17px;
}

/* INPUT GRID */

.semester-box{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;

    margin-bottom:25px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:10px;
    font-size:17px;
    font-weight:bold;
}

.input-group input{
    padding:14px;

    border:none;
    outline:none;

    border-radius:14px;

    font-size:16px;

    background:rgba(255,255,255,0.95);
}

/* BUTTON */

button{
    width:100%;
    padding:18px;

    border:none;
    border-radius:16px;

    margin-top:20px;

    background:linear-gradient(45deg,#ff9800,#ff5722);

    color:white;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    transition:0.4s;
}

button:hover{
    transform:scale(1.02);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* RESULT */

.result-box{
    margin-top:35px;

    text-align:center;

    background:rgba(255,255,255,0.10);

    padding:30px;

    border-radius:22px;

    border:1px solid rgba(255,255,255,0.2);
}

.result-box h1{
    color:#00ffcc;
    font-size:38px;
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    color:#ddd;
    font-size:15px;
}

/* MOBILE */

@media(max-width:768px){

    header h1{
        font-size:30px;
    }

    header h2{
        font-size:17px;
    }

    .card{
        padding:25px;
    }

    .semester-box{
        grid-template-columns:1fr;
    }

    .top-text h3{
        font-size:22px;
    }

    .result-box h1{
        font-size:28px;
    }

    button{
        font-size:20px;
    }
}

</style>
</head>

<body>

<header>
    <h1>KIET GROUP OF INSTITUTIONS</h1>
    <h2>Cumulative Grade Point Average (CGPA)</h2>
</header>

<div class="container">

<div class="card">

    <div class="top-text">
        <h3>CGPA Calculator</h3>
        <p>Enter Semester SGPA and Semester Credits</p>
    </div>

    <!-- 1-1 -->
    <div class="semester-box">
        <div class="input-group">
            <label>1-1 SGPA</label>
            <input type="number" step="0.01" id="1" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>1-1 Total Credits</label>
            <input type="number" step="0.1" id="11" placeholder="19.5">
        </div>
    </div>

    <!-- 1-2 -->
    <div class="semester-box">
        <div class="input-group">
            <label>1-2 SGPA</label>
            <input type="number" step="0.01" id="2" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>1-2 Total Credits</label>
            <input type="number" step="0.1" id="12" placeholder="19.5">
        </div>
    </div>

    <!-- 2-1 -->
    <div class="semester-box">
        <div class="input-group">
            <label>2-1 SGPA</label>
            <input type="number" step="0.01" id="3" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>2-1 Total Credits</label>
            <input type="number" step="0.1" id="13" placeholder="21.5">
        </div>
    </div>

    <!-- 2-2 -->
    <div class="semester-box">
        <div class="input-group">
            <label>2-2 SGPA</label>
            <input type="number" step="0.01" id="4" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>2-2 Total Credits</label>
            <input type="number" step="0.1" id="14" placeholder="21.5">
        </div>
    </div>

    <!-- 3-1 -->
    <div class="semester-box">
        <div class="input-group">
            <label>3-1 SGPA</label>
            <input type="number" step="0.01" id="5" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>3-1 Total Credits</label>
            <input type="number" step="0.1" id="15" placeholder="21.5">
        </div>
    </div>

    <!-- 3-2 -->
    <div class="semester-box">
        <div class="input-group">
            <label>3-2 SGPA</label>
            <input type="number" step="0.01" id="6" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>3-2 Total Credits</label>
            <input type="number" step="0.1" id="16" placeholder="21.5">
        </div>
    </div>

    <!-- 4-1 -->
    <div class="semester-box">
        <div class="input-group">
            <label>4-1 SGPA</label>
            <input type="number" step="0.01" id="7" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>4-1 Total Credits</label>
            <input type="number" step="0.1" id="17" placeholder="23">
        </div>
    </div>

    <!-- 4-2 -->
    <div class="semester-box">
        <div class="input-group">
            <label>4-2 SGPA</label>
            <input type="number" step="0.01" id="8" placeholder="Enter SGPA">
        </div>

        <div class="input-group">
            <label>4-2 Total Credits</label>
            <input type="number" step="0.1" id="18" placeholder="12">
        </div>
    </div>

    <button onclick="calculateTotal()">
        CALCULATE CGPA
    </button>

    <div class="result-box">
        <h1 id="result">Your CGPA: --</h1>
    </div>

</div>

</div>

<footer>
    © 2026 KIET CGPA Calculator | Designed by Veeranna
</footer>

<script>

function calculateTotal(){

    var A = parseFloat(document.getElementById("11").value) || 0;
    var B = parseFloat(document.getElementById("12").value) || 0;
    var C = parseFloat(document.getElementById("13").value) || 0;
    var D = parseFloat(document.getElementById("14").value) || 0;
    var E = parseFloat(document.getElementById("15").value) || 0;
    var F = parseFloat(document.getElementById("16").value) || 0;
    var G = parseFloat(document.getElementById("17").value) || 0;
    var H = parseFloat(document.getElementById("18").value) || 0;

    var a = parseFloat(document.getElementById("1").value) || 0;
    var b = parseFloat(document.getElementById("2").value) || 0;
    var c = parseFloat(document.getElementById("3").value) || 0;
    var d = parseFloat(document.getElementById("4").value) || 0;
    var e = parseFloat(document.getElementById("5").value) || 0;
    var f = parseFloat(document.getElementById("6").value) || 0;
    var g = parseFloat(document.getElementById("7").value) || 0;
    var h = parseFloat(document.getElementById("8").value) || 0;

    var totalCredits = A+B+C+D+E+F+G+H;

    if(totalCredits == 0){
        document.getElementById("result").innerHTML =
        "Please Enter Valid Data";
        return;
    }

    var cgpa =
    (
        (a*A) +
        (b*B) +
        (c*C) +
        (d*D) +
        (e*E) +
        (f*F) +
        (g*G) +
        (h*H)
    ) / totalCredits;

    document.getElementById("result").innerHTML =
    "Your CGPA: " + cgpa.toFixed(2);
}

</script>

</body>
</html>
